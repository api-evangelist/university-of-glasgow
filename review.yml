  - date: '2026-06-03'
    rating: 2
    summary: >-
      The University of Glasgow has no unified, documented developer/API portal.
      Its confirmed, machine-accessible public surface consists of two EPrints
      OAI-PMH 2.0 endpoints, both of which I probed live and returned HTTP 200:
      Enlighten Publications (eprints.gla.ac.uk/cgi/oai2) and Enlighten Research
      Data (researchdata.gla.ac.uk/cgi/oai2), the latter returning a valid
      Identify response naming "Enlighten Research Data". Departmental
      open-source code exists on GitHub (e.g. UoGSoE, School of Engineering IT,
      verified live) but there is no single official org. Most institutional
      systems sit behind Shibboleth/SAML SSO (GUID). No REST developer portal,
      no public SignUp, no documented rate limits or pricing were found; no
      endpoints were fabricated.
